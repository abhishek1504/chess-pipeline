# DISABLED — Backfill is disabled to avoid duplicate uploads and bot detection.
# Run backfill manually on your Mac if needed:
#   python backfill.py 2026 01
#   python step2_generate_video.py
#   python step3_generate_scripts.py
#   python step5_upload_youtube.py

name: Chess Backfill (DISABLED)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type ENABLE to run this workflow'
        required: true
        default: 'disabled'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if enabled
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "ENABLE" ]; then
            echo "Backfill is disabled. Type ENABLE in the confirm field to run."
            exit 1
          fi
          echo "Running backfill..."
