# DISABLED — See backfill_auto.yml for instructions.
name: Chess Backfill Manual (DISABLED)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type ENABLE to run this workflow'
        required: true
        default: 'disabled'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if enabled
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "ENABLE" ]; then
            echo "Backfill is disabled."
            exit 1
          fi
