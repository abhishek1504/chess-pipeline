name: Chess Content Pipeline (Daily)

on:
  schedule:
    # 11:00 PM IST = 5:30 PM UTC
    - cron: '30 17 * * *'
  workflow_dispatch:

concurrency:
  group: youtube-upload-lock
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write   # needed to push the upload log back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Step 1: Fetch today's won games ───────────────────────────────────
      - name: Fetch today's won games
        run: python watcher.py
        env:
          CHESS_USERNAME: abhi15041984
          CHECKMATE_ONLY: "true"   # only upload games won by checkmate

      # ── Check if any games passed quality filter ──────────────────────────
      - name: Check for games
        id: check
        run: |
          COUNT=$(python -c 'import json; print(len(json.load(open("won_games.json"))))')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt "0" ]; then
            echo "has_games=true" >> $GITHUB_OUTPUT
            echo "✅ Found $COUNT quality wins today!"
          else
            echo "has_games=false" >> $GITHUB_OUTPUT
            echo "😴 No quality wins today — pipeline stops here."
          fi

      # ── Step 2: Generate landscape + portrait videos ──────────────────────
      - name: Generate videos
        if: steps.check.outputs.has_games == 'true'
        run: python step2_generate_video.py
        env:
          MAX_UPLOADS: "3"

      # ── Step 3: Generate titles, descriptions, hashtags ───────────────────
      - name: Generate scripts and metadata
        if: steps.check.outputs.has_games == 'true'
        run: python step3_generate_scripts.py
        env:
          MAX_UPLOADS: "3"
          # Optional: set this repo secret to get AI-written per-game
          # stories in descriptions. Pipeline works without it too.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Step 5: Upload landscape + portrait to YouTube ────────────────────
      - name: Random delay before upload (avoid robotic timing pattern)
        if: steps.check.outputs.has_games == 'true'
        run: |
          DELAY=$((RANDOM % 600 + 60))
          echo "Waiting ${DELAY}s before uploading..."
          sleep $DELAY

      - name: Upload to YouTube
        if: steps.check.outputs.has_games == 'true'
        run: python step5_upload_youtube.py
        env:
          YOUTUBE_TOKEN:   ${{ secrets.YOUTUBE_TOKEN }}
          MAX_UPLOADS:     "3"

      # ── Commit upload log so next run knows what was uploaded ─────────────
      # CRITICAL: if this push fails, the next run re-uploads the same
      # games. Long runs mean main often moves underneath us (merged PRs),
      # so pull --rebase and retry instead of the old silent '|| true'.
      - name: Commit upload log
        if: steps.check.outputs.has_games == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add uploaded_games.json
          if git diff --staged --quiet; then
            echo "No upload log changes to commit."
            exit 0
          fi
          git commit -m "Update upload log [skip ci]"
          for i in 1 2 3; do
            if git push; then
              echo "Upload log pushed."
              exit 0
            fi
            echo "Push failed (attempt $i) — rebasing on latest main and retrying..."
            git pull --rebase origin main
            sleep 5
          done
          echo "::error::Could not push upload log — next run may re-upload these games!"
          exit 1

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Summary
        if: steps.check.outputs.has_games == 'true'
        run: |
          echo "🏁 Daily pipeline complete!"
          echo "Videos generated: $(find videos/ -name 'landscape.mp4' 2>/dev/null | wc -l)"
          echo "Scripts generated: $(find videos/ -name 'script.txt' 2>/dev/null | wc -l)"
